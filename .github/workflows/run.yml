name: Bilibili Dynamic Monitor

on:
  schedule:
    - cron: "*/3 * * * *"   # 每3分钟执行一次
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python main.py
